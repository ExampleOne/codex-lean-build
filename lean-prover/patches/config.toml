# GENERATED from lean-prover.toml by scripts/gen_config.py — do not edit by hand.
# Drop into $CODEX_HOME/config.toml (run.sh does this automatically).

model = "gpt-5.2-codex"
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "disabled"

[tools]
web_search = false
view_image = false
experimental_request_user_input = { enabled = false }

# --- lean-lsp-mcp (structured goal/diagnostics + lemma search) ---
# Exposes only: lean_goal, lean_diagnostic_messages, lean_leansearch, lean_state_search, lean_local_search
[mcp_servers.lean-lsp]
command = "uvx"
args = ["lean-lsp-mcp"]
startup_timeout_sec = 60
tool_timeout_sec = 120
[mcp_servers.lean-lsp.env]
LEAN_PROJECT_PATH = "."
LEAN_MCP_DISABLED_TOOLS = "lean_build,lean_run_code,lean_multi_attempt,lean_verify,lean_loogle,lean_hammer_premise"
